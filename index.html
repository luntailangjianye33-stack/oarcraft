<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0E17">
<title>OARCRAFT v1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0E17;color:#E2E8F0;min-height:100vh;min-height:100dvh;overscroll-behavior:none;font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1E293B;border-radius:3px}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit;font-size:16px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:20px}
.lb{background:#111827;border:1px solid #1E293B;border-radius:16px;padding:36px;width:90%;max-width:400px;text-align:center}
.lb h1{font-size:26px;font-weight:800;letter-spacing:2px;margin-bottom:4px}.lb h1 b{color:#00E5A0}
.lb .sub{font-size:11px;color:#94A3B8;letter-spacing:3px;margin-bottom:24px}
.lb input{width:100%;background:#0A0E17;border:1px solid #1E293B;border-radius:10px;padding:14px;color:#E2E8F0;font-size:18px;text-align:center;letter-spacing:4px;font-weight:700;outline:none;margin-bottom:14px}
.lb input:focus{border-color:#00E5A0}
.lb input::placeholder{letter-spacing:1px;font-weight:400;font-size:13px}
.lb .or{color:#94A3B8;font-size:12px;margin:14px 0}
#ls{margin-top:12px;font-size:12px;min-height:20px}
#app{display:none}
header{background:linear-gradient(180deg,#111827,#0A0E17);border-bottom:1px solid #1E293B;padding:0 20px;position:sticky;top:0;z-index:100}
.hdr{display:flex;align-items:center;justify-content:space-between;height:52px;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px}
.logo-i{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#00E5A0,#0EA5E9);display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-t{font-size:16px;font-weight:800;letter-spacing:2px}.logo-t b{color:#00E5A0}
nav.desktop-nav{display:flex;gap:2px;height:52px;overflow-x:auto}
nav.desktop-nav button{background:none;border:none;padding:0 12px;height:100%;display:flex;align-items:center;gap:4px;font-size:12px;color:#94A3B8;transition:.2s;border-bottom:2px solid transparent;white-space:nowrap}
nav.desktop-nav button:hover{color:#E2E8F0}nav.desktop-nav button.on{color:#00E5A0;font-weight:700;border-bottom-color:#00E5A0}
.hi{display:flex;align-items:center;gap:8px}
.sb{padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}
.sb-on{background:#00E5A018;color:#00E5A0;border:1px solid #00E5A033}
.sb-off{background:#FF475718;color:#FF4757;border:1px solid #FF475733}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:#111827;border-top:1px solid #1E293B;padding:0 0 env(safe-area-inset-bottom,0);height:calc(60px + env(safe-area-inset-bottom,0))}
.bottom-nav-inner{display:flex;justify-content:space-around;align-items:stretch;height:60px;max-width:600px;margin:0 auto}
.bottom-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;color:#94A3B8;font-size:11px;font-weight:500;transition:color .2s;padding:4px 0;min-width:0;position:relative}
.bottom-nav button .bnav-ic{font-size:20px;line-height:1;transition:transform .2s}
.bottom-nav button .bnav-lb{font-size:10px;line-height:1;white-space:nowrap}
.bottom-nav button.on{color:#00E5A0;font-weight:700}
.bottom-nav button.on .bnav-ic{transform:scale(1.15)}
.bottom-nav button.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2.5px;background:#00E5A0;border-radius:0 0 2px 2px}
main{max-width:1200px;margin:0 auto;padding:16px 16px 48px}
.tab{display:none}.tab.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.cd{background:#111827;border-radius:12px;border:1px solid #1E293B;padding:16px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.mt{text-align:center}.mt-l{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.mt-v{font-size:22px;font-weight:800;font-family:monospace;line-height:1}.mt-u{font-size:11px;font-weight:400;color:#94A3B8}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.sh-l{display:flex;align-items:center;gap:6px}.sh em{font-style:normal;font-size:16px}.sh h2{font-size:15px;font-weight:700}
.sh-s{font-size:12px;color:#94A3B8;margin:-4px 0 12px 0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;transition:.2s;min-height:44px}
.btn-p{background:#00E5A0;color:#0A0E17}.btn-p:hover{background:#00cc8e}
.btn-s{background:transparent;color:#94A3B8;border:1px solid #1E293B}.btn-s:hover{border-color:#00E5A0;color:#00E5A0}
.btn-d{background:transparent;color:#FF4757;border:1px solid #FF475733}
.btn-sm{padding:6px 12px;font-size:11px;min-height:36px}
.btns{display:flex;gap:8px;flex-wrap:wrap}
table{width:100%;border-collapse:separate;border-spacing:0 3px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1E293B}
td{padding:8px 10px;font-size:13px}tr:hover td{background:rgba(0,229,160,.03)}.mono{font-family:monospace}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:fi .2s ease}
.modal{background:#111827;border:1px solid #1E293B;border-radius:14px;padding:22px;width:92%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:12px}.fg label{display:block;font-size:12px;color:#94A3B8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;background:#0A0E17;border:1px solid #1E293B;border-radius:8px;padding:10px 12px;color:#E2E8F0;font-size:16px;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#00E5A0}
.fg textarea{resize:vertical;min-height:48px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.modal-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:14px}
.badge{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
select option{background:#0A0E17}
.sr{display:grid;grid-template-columns:60px 50px 50px 1fr 60px 44px 44px;gap:4px;padding:8px;border-radius:6px;align-items:center;font-size:12px}
.sr:hover{background:rgba(0,229,160,.03)}
.ath-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ath-chip{padding:8px 14px;border-radius:16px;font-size:12px;font-weight:600;border:1px solid #1E293B;background:transparent;color:#94A3B8;transition:.2s;min-height:36px}
.ath-chip:hover{border-color:#00E5A0}.ath-chip.on{background:#00E5A018;border-color:#00E5A0;color:#00E5A0}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-h{text-align:center;font-size:11px;color:#94A3B8;padding:6px 0;font-weight:600}
.cal-d{background:#0d1422;border-radius:6px;padding:6px 4px;min-height:72px;cursor:pointer;transition:.2s;border:1px solid transparent;position:relative}
.cal-d:hover{border-color:#1E293B}.cal-d.today{border-color:#00E5A066}
.cal-d.has-actual{border-left:3px solid #00E5A0}
.cal-dn{font-size:12px;color:#94A3B8;margin-bottom:3px;font-weight:500}.cal-dn.today{color:#00E5A0;font-weight:700}
.cal-ev{font-size:13px;padding:2px 4px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-plan{border-left:2px solid transparent;padding-left:3px;opacity:.7}
.cal-actual{border-left:2px solid #00E5A0;padding-left:3px;font-weight:600}
.cal-sep{height:1px;background:#1E293B;margin:2px 0}
.cal-toggle{display:flex;gap:6px;margin-bottom:10px}
.cal-toggle button{padding:6px 12px;border-radius:12px;font-size:11px;font-weight:600;border:1px solid #1E293B;background:transparent;color:#94A3B8;transition:.2s;min-height:36px}
.cal-toggle button.on{border-color:currentColor}
.xp-bar{background:#1E293B;border-radius:8px;height:10px;overflow:hidden;margin-top:6px}
.xp-fill{height:100%;border-radius:8px;transition:width .5s ease}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:14px;font-size:13px;font-weight:700}
.lvl{font-size:14px;font-weight:800;font-family:monospace}
.chart-wrap{position:relative;width:100%;overflow:hidden}
.chart-wrap svg{display:block}
svg text{font-family:-apple-system,sans-serif}
.toast{position:fixed;bottom:20px;right:20px;background:#111827;border:1px solid #00E5A0;border-radius:10px;padding:12px 18px;font-size:13px;color:#00E5A0;z-index:300;animation:fi .3s ease}
.toast.err{border-color:#FF4757;color:#FF4757}
.toast.xp-toast{border-color:#F59E0B;color:#F59E0B}
.empty{text-align:center;color:#94A3B8;padding:24px;font-size:13px}
footer{border-top:1px solid #1E293B;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#94A3B8}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}

/* LINE-STYLE CHAT */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 180px);max-height:600px;background:#0A0E17;border-radius:12px;border:1px solid #1E293B;overflow:hidden}
.chat-header{background:#111827;padding:12px 16px;border-bottom:1px solid #1E293B;display:flex;align-items:center;justify-content:space-between}
.chat-header h3{font-size:15px;font-weight:700;margin:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-date-divider{text-align:center;margin:12px 0;position:relative}
.chat-date-divider span{background:#0A0E17;padding:0 12px;font-size:11px;color:#94A3B8;position:relative;z-index:1}
.chat-date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#1E293B}
.chat-msg{display:flex;gap:8px;max-width:80%}
.chat-msg.mine{align-self:flex-end;flex-direction:row-reverse}
.chat-msg.other{align-self:flex-start}
.chat-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.chat-avatar.coach{background:#F59E0B22;color:#F59E0B}
.chat-avatar.athlete{background:#0EA5E922;color:#0EA5E9}
.chat-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;position:relative;word-break:break-word;max-width:100%}
.chat-msg.mine .chat-bubble{background:#00E5A0;color:#0A0E17;border-bottom-right-radius:4px}
.chat-msg.other .chat-bubble{background:#1E293B;color:#E2E8F0;border-bottom-left-radius:4px}
.chat-bubble-meta{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.chat-bubble-name{font-size:11px;font-weight:700}
.chat-msg.mine .chat-bubble-name{color:#0A0E1799}
.chat-msg.other .chat-bubble-name{color:#94A3B8}
.chat-bubble-role{font-size:9px;padding:1px 5px;border-radius:4px}
.chat-bubble-role.coach{background:#F59E0B33;color:#F59E0B}
.chat-bubble-role.athlete{background:#0EA5E933;color:#0EA5E9}
.chat-bubble-text{white-space:pre-wrap}
.chat-bubble-time{font-size:10px;margin-top:4px;opacity:.6;text-align:right}
.chat-msg.mine .chat-bubble-time{color:#0A0E1780}
.chat-input-area{background:#111827;padding:12px 16px;border-top:1px solid #1E293B;display:flex;gap:8px;align-items:flex-end}
.chat-input-wrap{flex:1;display:flex;align-items:flex-end;background:#0A0E17;border:1px solid #1E293B;border-radius:20px;padding:4px 4px 4px 14px}
.chat-input-wrap:focus-within{border-color:#00E5A0}
.chat-input{flex:1;background:transparent;border:none;color:#E2E8F0;font-size:15px;padding:8px 0;outline:none;resize:none;max-height:100px;line-height:1.4}
.chat-input::placeholder{color:#64748B}
.chat-send-btn{width:36px;height:36px;border-radius:50%;background:#00E5A0;border:none;color:#0A0E17;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,background .2s}
.chat-send-btn:hover{background:#00cc8e}
.chat-send-btn:active{transform:scale(.95)}
.chat-send-btn:disabled{background:#1E293B;color:#64748B;cursor:not-allowed}

/* iOS FILES-STYLE LIBRARY */
.files-container{background:#0A0E17;border-radius:12px;border:1px solid #1E293B;overflow:hidden}
.files-toolbar{background:#111827;padding:12px 16px;border-bottom:1px solid #1E293B;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.files-breadcrumb{display:flex;align-items:center;gap:4px;font-size:13px;flex-wrap:wrap}
.files-breadcrumb button{background:none;border:none;color:#0EA5E9;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .2s}
.files-breadcrumb button:hover{background:#0EA5E911}
.files-breadcrumb span{color:#94A3B8}
.files-view-toggle{display:flex;gap:2px;background:#1E293B;border-radius:8px;padding:2px}
.files-view-toggle button{background:none;border:none;padding:6px 10px;font-size:14px;cursor:pointer;border-radius:6px;color:#94A3B8;transition:all .2s}
.files-view-toggle button.on{background:#0A0E17;color:#E2E8F0}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:16px}
.files-list{padding:8px 0}
.file-item{cursor:pointer;transition:all .2s;position:relative}
.file-item:hover{transform:translateY(-2px)}
.file-item.grid{background:#111827;border-radius:12px;padding:16px;text-align:center;border:1px solid transparent}
.file-item.grid:hover{border-color:#1E293B}
.file-item.grid .file-icon{width:56px;height:56px;margin:0 auto 10px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px}
.file-item.grid .file-name{font-size:12px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.file-item.grid .file-meta{font-size:10px;color:#94A3B8;margin-top:4px}
.file-item.list{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #1E293B11}
.file-item.list:hover{background:#111827}
.file-item.list .file-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.file-item.list .file-info{flex:1;min-width:0}
.file-item.list .file-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item.list .file-desc{font-size:12px;color:#94A3B8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.file-item.list .file-meta{font-size:11px;color:#64748B;margin-top:2px}
.file-item.list .file-arrow{color:#64748B;font-size:16px}
.file-item.folder .file-icon{background:linear-gradient(135deg,#3B82F6,#0EA5E9)}
.file-item.folder .file-name{color:#0EA5E9}
.file-type-report .file-icon{background:linear-gradient(135deg,#0EA5E9,#3B82F6)}
.file-type-paper .file-icon{background:linear-gradient(135deg,#8B5CF6,#A855F7)}
.file-type-video .file-icon{background:linear-gradient(135deg,#EF4444,#F97316)}
.file-type-doc .file-icon{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.file-type-link .file-icon{background:linear-gradient(135deg,#22C55E,#10B981)}
.file-type-other .file-icon{background:linear-gradient(135deg,#64748B,#94A3B8)}
.files-empty{text-align:center;padding:48px 24px;color:#94A3B8}
.files-empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

@media(max-width:640px){
  header{padding:0 12px}
  nav.desktop-nav{display:none}
  .bottom-nav{display:block}
  .hi .sb{font-size:13px;padding:3px 8px}
  #td{display:none}
  main{padding:12px 12px calc(70px + env(safe-area-inset-bottom,0)) 12px}
  footer{display:none}
  .g4{grid-template-columns:1fr 1fr;gap:8px}
  .cd{padding:14px;border-radius:10px;margin-bottom:10px}
  .mt-v{font-size:20px}
  .btn{padding:10px 16px;font-size:13px;border-radius:10px;min-height:44px}
  .btn-sm{padding:8px 12px;font-size:12px;min-height:40px}
  .sr{grid-template-columns:1fr;gap:4px;padding:12px;border:1px solid #1E293B;border-radius:10px;margin-bottom:6px;position:relative}
  .sr-mob-top{display:flex;align-items:center;gap:8px;font-size:13px}
  .sr-mob-mid{font-size:14px;padding:4px 0;line-height:1.5}
  .sr-mob-bot{display:flex;align-items:center;gap:10px;font-size:12px;color:#94A3B8}
  .sr-del{position:absolute;top:10px;right:10px}
  .cal{gap:2px}
  .cal-d{min-height:48px;padding:4px 3px;border-radius:5px}
  .cal-dn{font-size:11px;margin-bottom:2px}
  .cal-ev{font-size:12px;padding:2px 3px;margin-bottom:2px}
  .modal-bg{align-items:flex-end}
  .modal{width:100%;max-width:100%;border-radius:18px 18px 0 0;max-height:92vh;padding:24px 18px calc(18px + env(safe-area-inset-bottom,0))}
  .modal h3{font-size:18px;margin-bottom:14px}
  .fg input,.fg select,.fg textarea{padding:12px 14px;font-size:16px;border-radius:10px}
  .modal-btns{gap:8px;margin-top:16px}
  .modal-btns .btn{flex:1;justify-content:center;padding:14px;font-size:14px;min-height:48px}
  .toast{bottom:calc(72px + env(safe-area-inset-bottom,0));right:12px;left:12px;text-align:center;font-size:14px}
  .chat-container{height:calc(100vh - 140px);max-height:none;border-radius:0;margin:-12px -12px calc(-70px - env(safe-area-inset-bottom,0));border:none}
  .chat-input-area{padding-bottom:calc(12px + env(safe-area-inset-bottom,0))}
  .chat-msg{max-width:85%}
  .files-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:12px}
  .file-item.grid{padding:12px}
  .file-item.grid .file-icon{width:44px;height:44px;font-size:22px;margin-bottom:8px}
  .file-item.grid .file-name{font-size:11px}
}
@media(min-width:1024px){
  .bottom-nav{display:none !important}
  nav.desktop-nav{display:flex !important}
  main{padding:20px 24px 48px}
}
</style>
</head>
<body>
<div id="login"><div class="lb">
<div style="font-size:28px;margin-bottom:8px">⛵</div>
<h1>OAR<b>CRAFT</b></h1><div class="sub">v1.0 — Chat & Files</div>
<input id="ti" maxlength="8" placeholder="チームコード" autocomplete="off" inputmode="text">
<button class="btn btn-p" style="width:100%;padding:12px;font-size:14px" onclick="joinT()">参加</button>
<div class="or">— または —</div>
<button class="btn btn-s" style="width:100%;padding:10px;font-size:12px" onclick="createT()">新規チーム作成</button>
<div class="or" style="margin-top:12px"><button class="btn btn-s" style="width:100%;padding:8px;font-size:11px;color:#94A3B8" onclick="goOff()">ローカルモード</button></div>
<div id="ls"></div>
</div></div>

<div id="app">
<header><div class="hdr">
<div class="logo"><div class="logo-i">⛵</div><div class="logo-t">OAR<b>CRAFT</b></div></div>
<nav class="desktop-nav" id="nv"></nav>

var FBC={apiKey:"AIzaSyCWZ4njD2g8kiUzvZJyS-Q82OcbrqHAHck",authDomain:"oarcraft-4c6eb.firebaseapp.com",databaseURL:"https://oarcraft-4c6eb-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"oarcraft-4c6eb",storageBucket:"oarcraft-4c6eb.firebasestorage.app",messagingSenderId:"765443196894",appId:"1:765443196894:web:c684f6e2df3660fdfcbf4f"};

var CATS=[{id:"OTW",nm:"水上",ic:"🚣",c:"#0EA5E9"},{id:"ERG",nm:"エルゴ",ic:"🏋️",c:"#00E5A0"},{id:"STR",nm:"筋トレ",ic:"💪",c:"#F59E0B"},{id:"CORE",nm:"体幹",ic:"🧘",c:"#8B5CF6"},{id:"RUN",nm:"ラン",ic:"🏃",c:"#EF4444"},{id:"BIKE",nm:"バイク",ic:"🚴",c:"#22C55E"},{id:"OTHER",nm:"その他",ic:"📌",c:"#64748B"}];

function catBdg(id){var c=catOf(id);return'<span class="badge" style="background:'+c.c+'18;color:'+c.c+';border:1px solid '+c.c+'33">'+c.ic+'</span>'}
function zoneBdg(z){var cs={UT1:"#3B82F6",UT2:"#22C55E",AT:"#F59E0B",VO2:"#EF4444",Race:"#00E5A0",AN:"#8B5CF6"};var c=cs[z]||"#475569";return z&&z!=="—"?'<span class="badge" style="background:'+c+'18;color:'+c+'">'+z+'</span>':''}
var DKS=["mon","tue","wed","thu","fri","sat","sun"],DLBS=["月","火","水","木","金","土","日"];
var DEF_PL=[{dy:"月",am:"UT1 水上 16-18km",pm:"ウェイト",z:"UT1",l:3},{dy:"火",am:"AT インターバル",pm:"体幹",z:"AT",l:5},{dy:"水",am:"UT1 水上 14-16km",pm:"ウェイト",z:"UT1",l:3},{dy:"木",am:"VO2max 1000m×5-6",pm:"補強",z:"VO2",l:5},{dy:"金",am:"UT1 水上（軽め）",pm:"ストレッチ",z:"UT1",l:2},{dy:"土",am:"レースペース",pm:"ウェイト",z:"Race",l:4},{dy:"日",am:"OFF",pm:"—",z:"OFF",l:0}];

var db=null,tc=null,tr=null,isOn=false;
var crew=[],sessions=[],plan=[],ergTests=[],rpe=[],library=[],comments=[],folders=[],teamMeta={name:"",boatName:""};
var curTab="dash";

function $(id){return document.getElementById(id)}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmtD(d){if(!d)return"—";var p=d.split("-");return(p[1]||"")+"/"+(p[2]||"")}
function today(){return new Date().toISOString().slice(0,10)}
function toast(m,cls){var t=$("toast");t.innerHTML='<div class="toast '+(cls||"")+'">'+m+'</div>';setTimeout(function(){t.innerHTML=""},2200)}
function sc(s){return{good:"#00E5A0",watch:"#FFB020",injury:"#FF4757"}[s]||"#64748B"}
function dot(s){return'<span class="dot" style="background:'+sc(s)+'"></span>'}
function trS(t){return t==="up"?'<span style="color:#00E5A0">▲</span>':t==="down"?'<span style="color:#FF4757">▼</span>':'━'}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function _s(tag,a,p){var e=document.createElementNS("http://www.w3.org/2000/svg",tag);if(a)for(var k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e}
function mkS(el,w,h){el.innerHTML="";var s=_s("svg",{width:"100%",height:h,viewBox:"0 0 "+w+" "+h});el.appendChild(s);return s}
function openM(h){$("modal").innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">'+h+'</div></div>'}
function closeM(){$("modal").innerHTML=""}
function mC(l,v,u,c){return'<div class="cd"><div class="mt"><div class="mt-l">'+l+'</div><div class="mt-v" style="color:'+c+'">'+v+'<span class="mt-u"> '+u+'</span></div></div></div>'}
function crewNames(){return crew.filter(function(c){return c.seat!=="Cox"}).map(function(c){return c.nm})}
function objToArr(o){if(!o)return[];if(Array.isArray(o))return o;return Object.keys(o).map(function(k){var v=o[k];v._id=k;return v})}

function saveItem(p,id,d){d.updated=Date.now();if(isOn&&tr)tr.child(p+"/"+id).set(d);else{var o=JSON.parse(localStorage.getItem("oc_"+p)||"{}");o[id]=d;localStorage.setItem("oc_"+p,JSON.stringify(o))}}
function delItem(p,id){if(isOn&&tr)tr.child(p+"/"+id).remove();else{var o=JSON.parse(localStorage.getItem("oc_"+p)||"{}");delete o[id];localStorage.setItem("oc_"+p,JSON.stringify(o))}}

function calcXP(){return sessions.length*10+rpe.length*5+crew.length*15+library.length*5+comments.length*3}
function calcLevel(xp){if(xp<100)return{lv:1,nm:"ノービス",next:100,c:"#64748B"};if(xp<300)return{lv:2,nm:"レギュラー",next:300,c:"#3B82F6"};if(xp<600)return{lv:3,nm:"アスリート",next:600,c:"#0EA5E9"};if(xp<1000)return{lv:4,nm:"エリート",next:1000,c:"#00E5A0"};if(xp<2000)return{lv:5,nm:"チャンピオン",next:2000,c:"#F59E0B"};return{lv:6,nm:"レジェンド",next:9999,c:"#FF4757"}}
function calcStreak(){var dates={};sessions.forEach(function(s){if(s.d)dates[s.d]=true});rpe.forEach(function(r){if(r.d)dates[r.d]=true});var streak=0,d=new Date();for(var i=0;i<365;i++){var ds=d.toISOString().slice(0,10);if(dates[ds])streak++;else if(i>0)break;d.setDate(d.getDate()-1)}return streak}
function streakColor(s){return s>=14?"#FF4757":s>=7?"#F59E0B":s>=3?"#00E5A0":"#64748B"}

function getWeekDates(weeksBack){var arr=[];var d=new Date();var dow=d.getDay()||7;d.setDate(d.getDate()-(dow-1)-weeksBack*7);for(var w=0;w<(weeksBack+1);w++){var wStart=new Date(d);wStart.setDate(d.getDate()+w*7);arr.push(wStart.toISOString().slice(0,10))}return arr}
function sessInWeek(wStart){var ws=new Date(wStart),we=new Date(wStart);we.setDate(ws.getDate()+6);var wes=we.toISOString().slice(0,10);return sessions.filter(function(s){return s.d>=wStart&&s.d<=wes})}

function drawBarChart(el,title,weeksBack){if(!el)return;var weeks=getWeekDates(weeksBack||7);var data=weeks.map(function(w){var ss=sessInWeek(w);var dur=0;ss.forEach(function(s){dur+=(s.dur||0)});return{w:w,dur:dur}});var cw=el.clientWidth||320,W=Math.max(cw,280),H=160,ml=36,mr=12,mt=24,mb=28;var g=mkS(el,W,H);var maxV=Math.max.apply(null,data.map(function(d){return d.dur}))||60;maxV=Math.ceil(maxV/30)*30||60;var bw=Math.max(((W-ml-mr)/data.length)-4,8),gap=((W-ml-mr)-bw*data.length)/(data.length);_s("text",{x:ml,y:14,fill:"#94A3B8","font-size":"9","font-weight":"600"},g).textContent=title||"週間トレーニング時間(分)";for(var i=0;i<=3;i++){var yy=mt+(H-mt-mb)*(1-i/3);_s("line",{x1:ml,y1:yy,x2:W-mr,y2:yy,stroke:"#1E293B","stroke-width":"1"},g);_s("text",{x:ml-4,y:yy+3,"text-anchor":"end",fill:"#94A3B8","font-size":"9"},g).textContent=Math.round(maxV*i/3)}data.forEach(function(d,i){var x=ml+i*(bw+gap)+gap/2;var bh=Math.max((d.dur/maxV)*(H-mt-mb),1);var y=H-mb-bh;_s("rect",{x:x,y:y,width:bw,height:bh,fill:"#00E5A0",rx:"3",opacity:".8"},g);if(d.dur>0)_s("text",{x:x+bw/2,y:y-3,"text-anchor":"middle",fill:"#00E5A0","font-size":"9","font-weight":"700"},g).textContent=d.dur;_s("text",{x:x+bw/2,y:H-mb+12,"text-anchor":"middle",fill:"#94A3B8","font-size":"9"},g).textContent=d.w.slice(5).replace("-","/")})}

function drawDistChart(el,weeksBack){if(!el)return;var weeks=getWeekDates(weeksBack||7);var data=weeks.map(function(w){var ss=sessInWeek(w);var dist=0;ss.forEach(function(s){dist+=(s.dist||0)});return{w:w,dist:Math.round(dist/1000*10)/10}});var cw=el.clientWidth||320,W=Math.max(cw,280),H=140,ml=36,mr=12,mt=24,mb=28;var g=mkS(el,W,H);var maxV=Math.max.apply(null,data.map(function(d){return d.dist}))||10;maxV=Math.ceil(maxV/5)*5||10;var bw=Math.max(((W-ml-mr)/data.length)-4,8),gap=((W-ml-mr)-bw*data.length)/(data.length);_s("text",{x:ml,y:14,fill:"#94A3B8","font-size":"9","font-weight":"600"},g).textContent="週間距離 (km)";for(var i=0;i<=3;i++){var yy=mt+(H-mt-mb)*(1-i/3);_s("line",{x1:ml,y1:yy,x2:W-mr,y2:yy,stroke:"#1E293B","stroke-width":"1"},g);_s("text",{x:ml-4,y:yy+3,"text-anchor":"end",fill:"#94A3B8","font-size":"9"},g).textContent=Math.round(maxV*i/3)}data.forEach(function(d,i){var x=ml+i*(bw+gap)+gap/2;var bh=Math.max((d.dist/maxV)*(H-mt-mb),1);var y=H-mb-bh;_s("rect",{x:x,y:y,width:bw,height:bh,fill:"#0EA5E9",rx:"3",opacity:".75"},g);if(d.dist>0)_s("text",{x:x+bw/2,y:y-3,"text-anchor":"middle",fill:"#0EA5E9","font-size":"9","font-weight":"700"},g).textContent=d.dist;_s("text",{x:x+bw/2,y:H-mb+12,"text-anchor":"middle",fill:"#94A3B8","font-size":"9"},g).textContent=d.w.slice(5).replace("-","/")})}

function initFB(){try{firebase.initializeApp(FBC);db=firebase.database();return true}catch(e){return false}}
function joinT(){var c=$("ti").value.trim().toUpperCase();if(!c||c.length<3){$("ls").innerHTML='<span style="color:#FF4757">3文字以上入力</span>';return}if(!initFB()){goOff();return}$("ls").innerHTML='<span style="color:#F59E0B">接続中...</span>';db.ref("teams/"+c).once("value",function(s){if(s.exists()){tc=c;tr=db.ref("teams/"+c);isOn=true;localStorage.setItem("oc_tc",c);startApp()}else{$("ls").innerHTML='<span style="color:#FF4757">見つかりません</span>'}},function(){$("ls").innerHTML='<span style="color:#FF4757">接続エラー</span>'})}
function createT(){if(!initFB()){goOff();return}var ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",c="";for(var i=0;i<6;i++)c+=ch[Math.floor(Math.random()*ch.length)];$("ls").innerHTML='<span style="color:#F59E0B">作成中...</span>';var ref=db.ref("teams/"+c);var po={};DEF_PL.forEach(function(d,i){po[DKS[i]]=d});ref.set({meta:{name:"新規チーム",boatName:"",created:new Date().toISOString()},crew:{},sessions:{},plan:po,ergTests:{},rpe:{},library:{},comments:{},folders:{}},function(e){if(e){$("ls").innerHTML='<span style="color:#FF4757">エラー</span>';return}tc=c;tr=ref;isOn=true;localStorage.setItem("oc_tc",c);startApp()})}
function goOff(){isOn=false;tc="LOCAL";crew=objToArr(JSON.parse(localStorage.getItem("oc_crew")||"[]"));sessions=objToArr(JSON.parse(localStorage.getItem("oc_sessions")||"[]"));library=objToArr(JSON.parse(localStorage.getItem("oc_library")||"[]"));comments=objToArr(JSON.parse(localStorage.getItem("oc_comments")||"[]"));folders=objToArr(JSON.parse(localStorage.getItem("oc_folders")||"[]"));plan=DEF_PL.slice();rpe=[];startApp()}
function startApp(){$("login").style.display="none";$("app").style.display="block";$("td").textContent=tc;$("si").innerHTML=isOn?'<span class="sb sb-on">🟢 同期</span>':'<span class="sb sb-off">⚫ ローカル</span>';$("fi").textContent=isOn?"Team: "+tc:"ローカル";if(isOn)listen();initNav();render()}
function listen(){tr.child("meta").on("value",function(s){teamMeta=s.val()||{};render()});tr.child("crew").on("value",function(s){crew=objToArr(s.val());render()});tr.child("sessions").on("value",function(s){sessions=objToArr(s.val());sessions.sort(function(a,b){return(b.d||"").localeCompare(a.d||"")});render()});tr.child("plan").on("value",function(s){var v=s.val();if(v)plan=DKS.map(function(k,i){var d=v[k]||DEF_PL[i];d._id=k;return d});render()});tr.child("rpe").on("value",function(s){rpe=objToArr(s.val());render()});tr.child("library").on("value",function(s){library=objToArr(s.val());library.sort(function(a,b){return(b.updated||0)-(a.updated||0)});render()});tr.child("comments").on("value",function(s){comments=objToArr(s.val());comments.sort(function(a,b){return(a.ts||0)-(b.ts||0)});render()});tr.child("folders").on("value",function(s){folders=objToArr(s.val());render()})}
(function(){var s=localStorage.getItem("oc_tc");if(s&&s!=="LOCAL")$("ti").value=s})();

var tabs=[{id:"dash",lb:"ホーム",ic:"🏠"},{id:"crew",lb:"クルー",ic:"⛵"},{id:"sess",lb:"記録",ic:"📝"},{id:"rpe",lb:"RPE",ic:"😓"},{id:"cal",lb:"カレンダー",ic:"📅"},{id:"lib",lb:"資料",ic:"📁"},{id:"cmt",lb:"トーク",ic:"💬"},{id:"ath",lb:"選手",ic:"👤"},{id:"data",lb:"データ",ic:"💾"}];
function initNav(){$("nv").innerHTML=tabs.map(function(t){return'<button data-t="'+t.id+'"'+(t.id===curTab?' class="on"':'')+'>'+t.ic+' '+t.lb+'</button>'}).join("");$("nv").onclick=function(e){var b=e.target.closest("button");if(b){curTab=b.dataset.t;render()}};$("bnvi").innerHTML=tabs.map(function(t){return'<button data-t="'+t.id+'"'+(t.id===curTab?' class="on"':'')+'><span class="bnav-ic">'+t.ic+'</span><span class="bnav-lb">'+t.lb+'</span></button>'}).join("");$("bnvi").onclick=function(e){var b=e.target.closest("button");if(b){curTab=b.dataset.t;render()}}}
function render(){if(!$("nv"))return;document.querySelectorAll("nav.desktop-nav button").forEach(function(b){b.className=b.dataset.t===curTab?"on":""});document.querySelectorAll(".bottom-nav-inner button").forEach(function(b){b.className=b.dataset.t===curTab?"on":""});var m=$("mn");if(curTab==="dash")rDash(m);else if(curTab==="crew")rCrew(m);else if(curTab==="sess")rSess(m);else if(curTab==="rpe")rRpe(m);else if(curTab==="cal")rCal(m);else if(curTab==="lib")rLib(m);else if(curTab==="cmt")rCmt(m);else if(curTab==="ath")rAth(m);else if(curTab==="data")rData(m);requestAnimationFrame(function(){if(curTab==="dash"){if($("dbar"))drawBarChart($("dbar"),"週間トレーニング時間 (分)",7);if($("ddist"))drawDistChart($("ddist"),7)}if(curTab==="cmt")scrollChatToBottom()})}

// DASHBOARD
function rDash(m){var xp=calcXP(),lv=calcLevel(xp),sk=calcStreak(),skc=streakColor(sk);var h='<div class="tab on"><div class="cd" style="text-align:center;padding:20px;border-color:'+lv.c+'33">';if(teamMeta.boatName)h+='<div style="font-size:11px;color:#94A3B8;margin-bottom:4px">🚣 '+esc(teamMeta.boatName)+'</div>';h+='<div class="lvl" style="color:'+lv.c+'">Lv.'+lv.lv+' '+lv.nm+'</div><div class="xp-bar" style="max-width:300px;margin:8px auto"><div class="xp-fill" style="width:'+Math.min(xp/lv.next*100,100)+'%;background:'+lv.c+'"></div></div><div style="font-size:13px;color:#94A3B8">'+xp+' / '+lv.next+' XP</div><div style="margin-top:12px"><span class="streak-badge" style="background:'+skc+'18;color:'+skc+';border:1px solid '+skc+'33">🔥 '+sk+'日連続</span></div></div>';h+='<div class="g4">'+mC("選手",crew.length,"名","#00E5A0")+mC("記録",sessions.length,"件","#0EA5E9")+mC("今週",sessThisWeek(),"件","#F59E0B")+mC("トーク",comments.length,"件","#8B5CF6")+'</div>';h+='<div class="cd"><div class="sh"><div class="sh-l"><em>⚡</em><h2>クイックアクション</h2></div></div><div class="btns"><button class="btn btn-p" onclick="curTab=\'sess\';render();setTimeout(function(){openSF(null)},100)">📝 記録</button><button class="btn btn-s" onclick="curTab=\'cmt\';render()">💬 トーク</button><button class="btn btn-s" onclick="curTab=\'lib\';render()">📁 資料</button></div></div>';h+='<div class="g2"><div class="cd"><div class="chart-wrap" id="dbar"></div></div><div class="cd"><div class="chart-wrap" id="ddist"></div></div></div>';h+='<div class="cd"><div class="sh"><div class="sh-l"><em>📋</em><h2>最近の記録</h2></div></div>';sessions.slice(0,5).forEach(function(s,i){h+='<div style="display:flex;gap:5px;padding:4px 6px;font-size:13px;align-items:center;border-radius:4px;background:'+(i%2?"transparent":"#0d1422")+'"><span class="mono" style="color:#94A3B8;width:40px">'+fmtD(s.d)+'</span>'+catBdg(s.cat)+' <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(s.ds||"")+' '+esc(s.nt)+'</span></div>'});if(!sessions.length)h+='<div class="empty">まだ記録がありません</div>';h+='</div></div>';m.innerHTML=h}
function sessThisWeek(){var d=new Date(),w=d.getDay()||7,mon=new Date(d);mon.setDate(d.getDate()-(w-1));var ms=mon.toISOString().slice(0,10);return sessions.filter(function(s){return s.d>=ms}).length}

// CREW
function rCrew(m){var h='<div class="tab on"><div class="cd"><div class="sh"><div class="sh-l"><em>⛵</em><h2>クルー管理</h2></div><div class="btns"><button class="btn btn-s btn-sm" onclick="editBoat()">🚣 艇名</button><button class="btn btn-p btn-sm" onclick="openCF(null)">＋</button></div></div>';if(teamMeta.boatName)h+='<div style="font-size:14px;font-weight:700;color:#0EA5E9;margin-bottom:8px">🚣 '+esc(teamMeta.boatName)+'</div>';h+='<div class="table-wrap"><table><thead><tr><th>席</th><th>名前</th><th>2K</th><th>kg</th><th></th></tr></thead><tbody>';crew.forEach(function(c){var id=c._id||"";h+='<tr style="cursor:pointer" onclick="openCF(\''+id+'\')"><td class="mono" style="color:#00E5A0;font-weight:700">'+esc(c.seat)+'</td><td style="font-weight:600">'+esc(c.nm)+'</td><td class="mono">'+esc(c.erg)+'</td><td class="mono" style="color:#94A3B8">'+c.w+'</td><td>'+dot(c.st)+'</td></tr>'});h+='</tbody></table></div></div></div>';m.innerHTML=h}
function editBoat(){openM('<h3>🚣 艇名設定</h3><div class="fg"><label>艇名</label><input id="bn" value="'+esc(teamMeta.boatName||"")+'"></div><div class="fg"><label>チーム名</label><input id="tn" value="'+esc(teamMeta.name||"")+'"></div><div class="modal-btns"><button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveBoat()">保存</button></div>')}
function saveBoat(){var o={name:$("tn").value.trim(),boatName:$("bn").value.trim(),created:teamMeta.created||new Date().toISOString()};if(isOn&&tr)tr.child("meta").set(o);teamMeta=o;closeM();render();toast("保存完了")}
function openCF(id){var c=id?crew.find(function(x){return x._id===id}):null;if(!c)c={seat:"",nm:"",erg:"",w:75,pw:0,st:"good",tr:"flat"};openM('<h3>⛵ '+(id?"編集":"追加")+'</h3><div class="fg-row"><div class="fg"><label>シート</label><input id="fs" value="'+esc(c.seat)+'"></div><div class="fg"><label>名前</label><input id="fn" value="'+esc(c.nm)+'"></div></div><div class="fg-row"><div class="fg"><label>2K</label><input id="fe" value="'+esc(c.erg)+'"></div><div class="fg"><label>体重</label><input id="fw" type="number" value="'+c.w+'"></div></div><div class="fg"><label>状態</label><select id="ft"><option value="good"'+(c.st==="good"?" selected":"")+'>Good</option><option value="watch"'+(c.st==="watch"?" selected":"")+'>Watch</option><option value="injury"'+(c.st==="injury"?" selected":"")+'>Injury</option></select></div><div class="modal-btns">'+(id?'<button class="btn btn-d" onclick="delCr(\''+id+'\')">削除</button>':'')+'<button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveCF(\''+(id||"")+"')\">保存</button></div>")}
function saveCF(id){var o={seat:$("fs").value.trim()||"?",nm:$("fn").value.trim()||"未入力",erg:$("fe").value.trim()||"—",w:parseInt($("fw").value)||0,pw:0,st:$("ft").value,tr:"flat"};if(!id)id=genId();saveItem("crew",id,o);closeM();if(!isOn)render();toast("保存完了")}
function delCr(id){if(!confirm("削除？"))return;delItem("crew",id);closeM();if(!isOn)render()}

// SESSIONS
var sf="ALL";
function rSess(m){var h='<div class="tab on"><div class="cd"><div class="sh"><div class="sh-l"><em>📝</em><h2>記録</h2></div><button class="btn btn-p" onclick="openSF(null)">＋ 記録</button></div><div class="btns" style="margin-bottom:8px"><button class="btn '+(sf==="ALL"?"btn-p":"btn-s")+' btn-sm" onclick="sf=\'ALL\';render()">全</button>';CATS.forEach(function(c){h+='<button class="btn '+(sf===c.id?"btn-p":"btn-s")+' btn-sm" onclick="sf=\''+c.id+'\';render()">'+c.ic+'</button>'});h+='</div>';var fl=sessions.filter(function(s){return sf==="ALL"||s.cat===sf});fl.forEach(function(s,i){var id=s._id||"";h+='<div class="sr" style="background:#0d1422;cursor:pointer;display:block;padding:10px;margin-bottom:6px;border:1px solid #1E293B;border-radius:8px" onclick="openSF(\''+id+'\')"><div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><span class="mono" style="color:#94A3B8">'+fmtD(s.d)+'</span>'+catBdg(s.cat)+zoneBdg(s.zone)+'</div><div style="font-size:14px">'+(s.ds||"—")+' <span style="color:#94A3B8">'+esc(s.nt)+'</span></div><div style="font-size:12px;color:#64748B;margin-top:4px">'+(s.dur?s.dur+'分 ':'')+(s.dist?(s.dist/1000).toFixed(1)+'km':'')+'</div></div>'});if(!fl.length)h+='<div class="empty">記録がありません</div>';h+='</div></div>';m.innerHTML=h}
function openSF(id){var s=id?sessions.find(function(x){return x._id===id}):null;if(!s)s={d:today(),cat:"OTW",zone:"UT1",who:"全員",ds:"",sp:"",r:0,nt:"",hr:0,dist:0,dur:0};var zones=["UT2","UT1","AT","VO2","Race","AN","—"];var names=["全員"].concat(crewNames());var h='<h3>📝 '+(id?"編集":"追加")+'</h3><div class="fg"><label>カテゴリ</label><select id="scat">';CATS.forEach(function(c){h+='<option value="'+c.id+'"'+(s.cat===c.id?" selected":"")+'>'+c.ic+' '+c.nm+'</option>'});h+='</select></div><div class="fg-row"><div class="fg"><label>日付</label><input id="sd" type="date" value="'+s.d+'"></div><div class="fg"><label>ゾーン</label><select id="sz">';zones.forEach(function(z){h+='<option value="'+z+'"'+(s.zone===z?" selected":"")+'>'+z+'</option>'});h+='</select></div></div><div class="fg-row"><div class="fg"><label>距離(m)</label><input id="sdi" type="number" value="'+(s.dist||0)+'"></div><div class="fg"><label>時間(分)</label><input id="sdu" type="number" value="'+(s.dur||0)+'"></div></div><div class="fg"><label>内容</label><input id="sds" value="'+esc(s.ds)+'"></div><div class="fg"><label>メモ</label><textarea id="snt">'+esc(s.nt)+'</textarea></div><div class="modal-btns">'+(id?'<button class="btn btn-d" onclick="delSs(\''+id+'\')">削除</button>':'')+'<button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveSF(\''+(id||"")+"')\">保存</button></div>";openM(h)}
function saveSF(id){var o={d:$("sd").value||today(),cat:$("scat").value,zone:$("sz").value,who:"全員",ds:$("sds").value.trim(),sp:"",r:0,hr:0,dist:parseInt($("sdi").value)||0,dur:parseInt($("sdu").value)||0,nt:$("snt").value.trim()};if(!id)id=genId();saveItem("sessions",id,o);closeM();if(!isOn)render();toast("保存完了")}
function delSs(id){if(!confirm("削除？"))return;delItem("sessions",id);closeM();if(!isOn)render()}

// RPE
function rRpe(m){var td=today(),names=crewNames();var h='<div class="tab on"><div class="cd"><div class="sh"><div class="sh-l"><em>😓</em><h2>RPE</h2></div><button class="btn btn-p" onclick="openRpeF()">＋ 入力</button></div><div class="sh-s">1〜10 — 7以上は要注意</div>';var tdr=rpe.filter(function(r){return r.d===td});if(tdr.length){h+='<div style="margin-bottom:10px;font-size:13px;color:#94A3B8">📅 今日</div>';tdr.forEach(function(r){var c=r.v>=8?"#FF4757":r.v>=6?"#F59E0B":"#00E5A0";h+='<div style="display:flex;align-items:center;gap:6px;padding:6px;margin-bottom:4px;border-radius:6px;background:#0d1422"><span style="width:60px;font-weight:600">'+esc(r.who)+'</span><div style="flex:1;background:#1E293B;border-radius:3px;height:10px"><div style="width:'+r.v*10+'%;height:100%;background:'+c+';border-radius:3px"></div></div><span class="mono" style="font-size:16px;font-weight:800;color:'+c+'">'+r.v+'</span></div>'})}if(!tdr.length)h+='<div class="empty">今日のRPEを入力しよう</div>';h+='</div></div>';m.innerHTML=h}
function openRpeF(){var td=today(),names=crewNames();var h='<h3>😓 RPE入力</h3><div class="fg"><label>日付</label><input id="rd" type="date" value="'+td+'"></div>';names.forEach(function(n,i){var ex=rpe.find(function(r){return r.d===td&&r.who===n});var v=ex?ex.v:5;h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="width:60px;font-size:13px;font-weight:600">'+esc(n)+'</span><input id="rv'+i+'" type="range" min="1" max="10" value="'+v+'" style="flex:1;accent-color:#00E5A0" oninput="$(\'rl'+i+'\').textContent=this.value"><span id="rl'+i+'" class="mono" style="font-size:16px;font-weight:800;width:28px;text-align:center">'+v+'</span></div>'});h+='<div class="modal-btns"><button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveRpe()">保存</button></div>';openM(h)}
function saveRpe(){var d=$("rd").value,names=crewNames();names.forEach(function(n,i){var v=parseInt($("rv"+i).value)||5;var id=d.replace(/-/g,"")+n.replace(/\s/g,"").slice(0,4);saveItem("rpe",id,{d:d,who:n,v:v,note:""})});closeM();if(!isOn)render();toast("保存完了")}

// CALENDAR
var calMonth=new Date().getMonth(),calYear=new Date().getFullYear();
function rCal(m){var h='<div class="tab on"><div class="cd"><div class="sh"><div class="sh-l"><em>📅</em><h2>カレンダー</h2></div><div class="btns"><button class="btn btn-s btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}render()">◀</button><span style="font-size:12px;font-weight:700;min-width:80px;text-align:center">'+calYear+'年'+(calMonth+1)+'月</span><button class="btn btn-s btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}render()">▶</button></div></div><div class="cal">';DLBS.forEach(function(d){h+='<div class="cal-h">'+d+'</div>'});var first=new Date(calYear,calMonth,1),startDow=(first.getDay()+6)%7,days=new Date(calYear,calMonth+1,0).getDate(),td2=today();for(var i=0;i<startDow;i++)h+='<div class="cal-d" style="opacity:.3"></div>';for(var d=1;d<=days;d++){var ds=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");var daySess=sessions.filter(function(s){return s.d===ds});var isT=ds===td2,hasActual=daySess.length>0;h+='<div class="cal-d'+(isT?" today":"")+(hasActual?" has-actual":"")+'" onclick="openDayDetail(\''+ds+'\')"><div class="cal-dn'+(isT?" today":"")+'">'+d+'</div>';daySess.slice(0,2).forEach(function(s){h+='<div class="cal-ev cal-actual" style="background:'+catOf(s.cat).c+'22;color:'+catOf(s.cat).c+'">'+catOf(s.cat).ic+'</div>'});h+='</div>'}h+='</div></div></div>';m.innerHTML=h}
function openDayDetail(ds){var daySess=sessions.filter(function(s){return s.d===ds});var h='<h3>📅 '+ds+'</h3>';if(daySess.length){daySess.forEach(function(s){h+='<div style="padding:8px;margin-bottom:6px;border-radius:6px;background:#0d1422">'+catBdg(s.cat)+' '+(s.ds||"")+'<div style="font-size:12px;color:#94A3B8;margin-top:4px">'+(s.dur?s.dur+'分':'')+'</div></div>'})}else{h+='<div class="empty">この日の記録はありません</div>'}h+='<div class="modal-btns"><button class="btn btn-p" onclick="closeM();curTab=\'sess\';render();setTimeout(function(){openSF(null)},100)">＋ 記録追加</button><button class="btn btn-s" onclick="closeM()">閉じる</button></div>';openM(h)}

// ATHLETE
var selA="";
function rAth(m){var names=crewNames();if(!selA&&names.length)selA=names[0];var h='<div class="tab on"><div class="cd"><div class="sh"><div class="sh-l"><em>👤</em><h2>選手分析</h2></div></div><div class="ath-sel">';names.forEach(function(n){h+='<button class="ath-chip'+(selA===n?" on":"")+'" onclick="selA=\''+esc(n)+'\';render()">'+esc(n)+'</button>'});h+='</div></div>';var as=sessions.filter(function(s){return s.who===selA||s.who==="全員"});var td2=0,tt=0;as.forEach(function(s){td2+=(s.dist||0);tt+=(s.dur||0)});h+='<div class="g4">'+mC("セッション",as.length,"件","#00E5A0")+mC("時間",tt,"分","#0EA5E9")+mC("距離",(td2/1000).toFixed(1),"km","#F59E0B")+mC("—","","","#64748B")+'</div>';h+='<div class="cd"><div class="sh"><div class="sh-l"><em>📋</em><h2>最近</h2></div></div>';as.slice(0,10).forEach(function(s,i){h+='<div style="display:flex;gap:4px;padding:6px;border-radius:4px;background:'+(i%2?"transparent":"#0d1422")+';font-size:13px"><span class="mono" style="color:#94A3B8;width:40px">'+fmtD(s.d)+'</span>'+catBdg(s.cat)+'<span style="flex:1">'+esc(s.ds||"")+'</span></div>'});if(!as.length)h+='<div class="empty">なし</div>';h+='</div></div>';m.innerHTML=h}

// ====== LIBRARY (iOS Files style) ======
var LIB_TYPES=[{id:"report",nm:"レポート",ic:"📊",c:"#0EA5E9"},{id:"paper",nm:"論文",ic:"📄",c:"#8B5CF6"},{id:"video",nm:"動画",ic:"🎥",c:"#EF4444"},{id:"doc",nm:"資料",ic:"📋",c:"#F59E0B"},{id:"link",nm:"リンク",ic:"🔗",c:"#22C55E"},{id:"other",nm:"その他",ic:"📌",c:"#64748B"}];
function libTypeOf(id){return LIB_TYPES.find(function(t){return t.id===id})||LIB_TYPES[5]}
var libFilter="ALL",libView="grid",curFolder=null;

function rLib(m){
var h='<div class="tab on"><div class="files-container">';
h+='<div class="files-toolbar">';
h+='<div class="files-breadcrumb"><button onclick="curFolder=null;render()">📁 すべて</button>';
if(curFolder){var fold=folders.find(function(f){return f._id===curFolder});h+='<span>›</span><button>'+esc(fold?fold.name:"")+'</button>';}
h+='</div><div style="display:flex;gap:8px;align-items:center">';
h+='<div class="files-view-toggle"><button class="'+(libView==="grid"?"on":"")+'" onclick="libView=\'grid\';render()">⊞</button><button class="'+(libView==="list"?"on":"")+'" onclick="libView=\'list\';render()">☰</button></div>';
h+='<button class="btn btn-s btn-sm" onclick="openFolderF()">📁+</button>';
h+='<button class="btn btn-p btn-sm" onclick="openLibF(null)">＋</button>';
h+='</div></div>';
h+='<div style="padding:12px 16px;border-bottom:1px solid #1E293B;display:flex;gap:6px;flex-wrap:wrap">';
h+='<button class="btn '+(libFilter==="ALL"?"btn-p":"btn-s")+' btn-sm" onclick="libFilter=\'ALL\';render()">すべて</button>';
LIB_TYPES.forEach(function(t){h+='<button class="btn '+(libFilter===t.id?"btn-p":"btn-s")+' btn-sm" onclick="libFilter=\''+t.id+'\';render()">'+t.ic+'</button>'});
h+='</div>';
var foldersInCur=folders.filter(function(f){return curFolder?f.parent===curFolder:!f.parent});
var filesInCur=library.filter(function(l){return(curFolder?l.folder===curFolder:!l.folder)&&(libFilter==="ALL"||l.type===libFilter)});
if(libView==="grid"){
h+='<div class="files-grid">';
foldersInCur.forEach(function(f){var cnt=library.filter(function(l){return l.folder===f._id}).length;h+='<div class="file-item grid folder" onclick="curFolder=\''+f._id+'\';render()"><div class="file-icon">📁</div><div class="file-name">'+esc(f.name)+'</div><div class="file-meta">'+cnt+'個</div></div>'});
filesInCur.forEach(function(l){var t=libTypeOf(l.type);h+='<div class="file-item grid file-type-'+l.type+'" onclick="openLibDetail(\''+l._id+'\')"><div class="file-icon">'+t.ic+'</div><div class="file-name">'+esc(l.title)+'</div><div class="file-meta">'+fmtD(l.d)+'</div></div>'});
if(!foldersInCur.length&&!filesInCur.length)h+='<div class="files-empty" style="grid-column:1/-1"><div class="files-empty-icon">📂</div><div>このフォルダは空です</div></div>';
h+='</div>';
}else{
h+='<div class="files-list">';
foldersInCur.forEach(function(f){var cnt=library.filter(function(l){return l.folder===f._id}).length;h+='<div class="file-item list folder" onclick="curFolder=\''+f._id+'\';render()"><div class="file-icon">📁</div><div class="file-info"><div class="file-name">'+esc(f.name)+'</div><div class="file-meta">'+cnt+'個</div></div><span class="file-arrow">›</span></div>'});
filesInCur.forEach(function(l){var t=libTypeOf(l.type);h+='<div class="file-item list file-type-'+l.type+'" onclick="openLibDetail(\''+l._id+'\')"><div class="file-icon">'+t.ic+'</div><div class="file-info"><div class="file-name">'+esc(l.title)+'</div>'+(l.desc?'<div class="file-desc">'+esc(l.desc)+'</div>':'')+'<div class="file-meta">'+fmtD(l.d)+'</div></div><span class="file-arrow">›</span></div>'});
if(!foldersInCur.length&&!filesInCur.length)h+='<div class="files-empty"><div class="files-empty-icon">📂</div><div>このフォルダは空です</div></div>';
h+='</div>';
}
h+='</div></div>';
m.innerHTML=h;
}

function openFolderF(id){var f=id?folders.find(function(x){return x._id===id}):null;if(!f)f={name:"",parent:curFolder};openM('<h3>📁 '+(id?"編集":"新規フォルダ")+'</h3><div class="fg"><label>フォルダ名</label><input id="fdn" value="'+esc(f.name)+'"></div><div class="modal-btns">'+(id?'<button class="btn btn-d" onclick="delFolder(\''+id+'\')">削除</button>':'')+'<button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveFolderF(\''+(id||"")+"')\">保存</button></div>")}
function saveFolderF(id){var o={name:$("fdn").value.trim()||"新規フォルダ",parent:curFolder||null};if(!id)id=genId();saveItem("folders",id,o);closeM();if(!isOn)render();toast("保存完了")}
function delFolder(id){if(!confirm("削除？"))return;delItem("folders",id);closeM();if(!isOn)render()}

function openLibF(id){var l=id?library.find(function(x){return x._id===id}):null;if(!l)l={title:"",type:"doc",url:"",desc:"",tags:"",by:"",d:today(),folder:curFolder};var h='<h3>📁 '+(id?"編集":"追加")+'</h3><div class="fg"><label>タイトル</label><input id="lt" value="'+esc(l.title)+'"></div><div class="fg-row"><div class="fg"><label>種類</label><select id="ltp">';LIB_TYPES.forEach(function(t){h+='<option value="'+t.id+'"'+(l.type===t.id?" selected":"")+'>'+t.ic+' '+t.nm+'</option>'});h+='</select></div><div class="fg"><label>日付</label><input id="ld" type="date" value="'+l.d+'"></div></div><div class="fg"><label>URL</label><input id="lu" value="'+esc(l.url||"")+'"></div><div class="fg"><label>説明</label><textarea id="ldc">'+esc(l.desc)+'</textarea></div><div class="fg"><label>投稿者</label><input id="lby" value="'+esc(l.by||"")+'"></div><div class="modal-btns">'+(id?'<button class="btn btn-d" onclick="delLib(\''+id+'\')">削除</button>':'')+'<button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveLibF(\''+(id||"")+"')\">保存</button></div>";openM(h)}
function saveLibF(id){var o={title:$("lt").value.trim()||"無題",type:$("ltp").value,d:$("ld").value||today(),url:$("lu").value.trim(),desc:$("ldc").value.trim(),tags:"",by:$("lby").value.trim(),folder:curFolder||null};if(!id)id=genId();saveItem("library",id,o);closeM();if(!isOn)render();toast("保存完了")}
function delLib(id){if(!confirm("削除？"))return;delItem("library",id);closeM();if(!isOn)render()}
function openLibDetail(id){var l=library.find(function(x){return x._id===id});if(!l)return;var t=libTypeOf(l.type);var h='<h3>'+t.ic+' '+esc(l.title)+'</h3>';if(l.desc)h+='<div style="font-size:14px;color:#CBD5E1;margin-bottom:12px;line-height:1.6;white-space:pre-wrap">'+esc(l.desc)+'</div>';if(l.url)h+='<div style="margin-bottom:12px"><a href="'+esc(l.url)+'" target="_blank" rel="noopener" style="color:#0EA5E9;font-size:14px;word-break:break-all">🔗 '+esc(l.url)+'</a></div>';h+='<div style="font-size:12px;color:#94A3B8">投稿: '+esc(l.by||"—")+' | '+esc(l.d)+'</div><div class="modal-btns"><button class="btn btn-s" onclick="closeM();openLibF(\''+id+'\')">✏️ 編集</button><button class="btn btn-s" onclick="closeM()">閉じる</button></div>';openM(h)}

// ====== COMMENTS (LINE-style Chat) ======
var cmtUser="",cmtRole="athlete";
function getCmtUser(){if(cmtUser)return cmtUser;cmtUser=localStorage.getItem("oc_cmt_user")||"";return cmtUser}
function setCmtUser(n){cmtUser=n;localStorage.setItem("oc_cmt_user",n)}
function getCmtRole(){if(cmtRole)return cmtRole;cmtRole=localStorage.getItem("oc_cmt_role")||"athlete";return cmtRole}
function setCmtRole(r){cmtRole=r;localStorage.setItem("oc_cmt_role",r)}

function rCmt(m){
var user=getCmtUser(),role=getCmtRole();
var h='<div class="tab on"><div class="chat-container">';
h+='<div class="chat-header"><h3>💬 チームトーク</h3><button class="btn btn-s btn-sm" onclick="openCmtSettings()">⚙️ '+(user||"設定")+'</button></div>';
h+='<div class="chat-messages" id="chatMsgs">';
var lastDate="";
comments.forEach(function(c){
var msgDate=new Date(c.ts).toLocaleDateString("ja-JP");
if(msgDate!==lastDate){h+='<div class="chat-date-divider"><span>'+msgDate+'</span></div>';lastDate=msgDate}
var isMine=c.author===user;
var avatarClass=c.role==="coach"?"coach":"athlete";
var avatarIcon=c.role==="coach"?"🎓":"🚣";
h+='<div class="chat-msg '+(isMine?"mine":"other")+'">';
if(!isMine)h+='<div class="chat-avatar '+avatarClass+'">'+avatarIcon+'</div>';
h+='<div class="chat-bubble"><div class="chat-bubble-meta"><span class="chat-bubble-name">'+esc(c.author)+'</span><span class="chat-bubble-role '+avatarClass+'">'+(c.role==="coach"?"コーチ":"選手")+'</span></div><div class="chat-bubble-text">'+esc(c.body)+'</div><div class="chat-bubble-time">'+fmtTime(c.ts)+'</div></div>';
if(isMine)h+='<div class="chat-avatar '+avatarClass+'">'+avatarIcon+'</div>';
h+='</div>';
});
if(!comments.length)h+='<div class="empty" style="margin:auto">メッセージを送信してチームとコミュニケーションしよう</div>';
h+='</div>';
h+='<div class="chat-input-area"><div class="chat-input-wrap"><textarea class="chat-input" id="chatInput" rows="1" placeholder="'+(user?"メッセージを入力...":"⚙️設定から名前を登録してください")+'" '+(user?"":"disabled")+' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea><button class="chat-send-btn" onclick="sendChat()" '+(user?"":"disabled")+'>➤</button></div></div>';
h+='</div></div>';
m.innerHTML=h;
}

function fmtTime(ts){if(!ts)return"";var d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function scrollChatToBottom(){var el=$("chatMsgs");if(el)el.scrollTop=el.scrollHeight}

function openCmtSettings(){var user=getCmtUser(),role=getCmtRole();openM('<h3>⚙️ チャット設定</h3><div class="fg"><label>表示名</label><input id="csn" value="'+esc(user)+'" placeholder="名前を入力"></div><div class="fg"><label>役割</label><select id="csr"><option value="coach"'+(role==="coach"?" selected":"")+'>🎓 コーチ</option><option value="athlete"'+(role==="athlete"?" selected":"")+'>🚣 選手</option></select></div><div class="modal-btns"><button class="btn btn-s" onclick="closeM()">×</button><button class="btn btn-p" onclick="saveCmtSettings()">保存</button></div>')}
function saveCmtSettings(){setCmtUser($("csn").value.trim());setCmtRole($("csr").value);closeM();render();toast("設定保存")}

function sendChat(){var user=getCmtUser(),role=getCmtRole();if(!user){openCmtSettings();toast("先に名前を設定してください","err");return}var input=$("chatInput");var body=input.value.trim();if(!body)return;var o={author:user,role:role,body:body,ts:Date.now()};var id=genId();saveItem("comments",id,o);input.value="";if(!isOn)render();toast("送信完了")}

// DATA
function rData(m){var h='<div class="tab on"><div class="g4">'+mC("選手",crew.length,"名","#00E5A0")+mC("記録",sessions.length,"件","#0EA5E9")+mC("資料",library.length,"件","#3B82F6")+mC("トーク",comments.length,"件","#F59E0B")+'</div>';h+='<div class="cd"><div class="sh"><div class="sh-l"><em>📤</em><h2>エクスポート</h2></div></div><div class="btns"><button class="btn btn-p" onclick="expJ()">JSON</button></div></div>';if(isOn){h+='<div class="cd" style="text-align:center;padding:16px"><div style="font-size:13px;color:#94A3B8;margin-bottom:4px">チームコード</div><div style="font-size:28px;font-weight:800;letter-spacing:6px;color:#00E5A0;font-family:monospace">'+tc+'</div></div>'}h+='<div class="cd" style="border-color:#FF475733"><button class="btn btn-d" onclick="logout()">ログアウト</button></div></div>';m.innerHTML=h}
function expJ(){var b=new Blob([JSON.stringify({crew:crew,sessions:sessions,plan:plan,rpe:rpe,library:library,comments:comments,v:"1.0"},null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="oarcraft.json";a.click();toast("保存")}
function logout(){if(!confirm("ログアウト？"))return;localStorage.removeItem("oc_tc");location.reload()}
</script>
